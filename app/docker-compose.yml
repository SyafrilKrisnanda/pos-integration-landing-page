services:
  postgres:
    image: postgres:16-alpine
    container_name: p001-bakso-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: p001_bakso_pos
      POSTGRES_USER: p001_user
      POSTGRES_PASSWORD: p001_dev_password
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - p001_postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U p001_user -d p001_bakso_pos"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  p001_postgres_data:
